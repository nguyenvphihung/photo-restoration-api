# Conda Environment for FastAPI Server
# This environment runs the API server only
# ZeroScratches and GFPGAN run in their own environments

name: api
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # FastAPI and server
    - fastapi==0.109.0
    - uvicorn[standard]==0.27.0
    - python-multipart==0.0.6
    
    # Data validation
    - pydantic==2.5.3
    - pydantic-settings==2.1.0
    
    # Cloud storage
    - cloudinary==1.38.0
    
    # Image processing (for API only)
    - opencv-python==4.9.0.80
    - numpy==1.24.3
    - Pillow==10.2.0
    
    # Environment variables
    - python-dotenv==1.0.0
    
    # HTTP client (optional)
    - requests
