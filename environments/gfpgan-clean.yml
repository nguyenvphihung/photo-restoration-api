# Conda Environment for GFPGAN
# Clean environment without OpenMP conflicts

name: gfpgan-clean
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Canonical pip list: requirements/gfpgan-clean.txt
    - fastapi==0.109.0
    - uvicorn[standard]==0.27.0
    - pydantic==2.5.3
    - torch==2.0.1
    - torchvision==0.15.2
    - opencv-python==4.9.0.80
    - pillow==10.2.0
    - numpy==1.24.3
    - basicsr==1.4.2
    - facexlib==0.3.0
    - gfpgan==1.3.8
    - realesrgan
    - addict
    - future
    - requests==2.31.0
    - scipy==1.11.4
    - tb-nightly
    - yapf
    - lmdb
    - lpips
    - pyyaml
    - tqdm
    - scikit-image
    - gdown
