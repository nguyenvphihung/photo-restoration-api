# Conda Environment for ZeroScratches
# Clean environment without OpenMP conflicts

name: rs-clean
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch==2.0.1
    - torchvision==0.15.2
    - opencv-python==4.9.0.80
    - pillow==10.2.0
    - numpy==1.24.3
    - einops
    - timm
    - transformers
    - lama-cleaner
    - mediapipe
