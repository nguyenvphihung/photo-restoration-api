# Conda Environment for GFPGAN
# Clean environment without OpenMP conflicts

name: gfpgan-clean
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch==2.0.1
    - torchvision==0.15.2
    - opencv-python==4.9.0.80
    - pillow==10.2.0
    - numpy==1.24.3
    - basicsr==1.4.2
    - facexlib==0.3.0
    - gfpgan==1.3.8
    - realesrgan
    - tb-nightly
    - yapf
    - lmdb
    - pyyaml
    - tqdm
    - scikit-image
