# Conda Environment for ZeroScratches
# Clean environment without OpenMP conflicts

name: rs-clean
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Canonical pip list: requirements/rs-clean.txt
    - fastapi==0.109.0
    - uvicorn[standard]==0.27.0
    - pydantic==2.5.3
    - torch==2.0.1
    - torchvision==0.15.2
    - opencv-python==4.9.0.80
    - pillow==10.2.0
    - numpy==1.24.3
    - zeroscratches
    - einops
    - timm
    - transformers
    - lama-cleaner
    - mediapipe
